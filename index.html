<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- THEME COLOR (IMPORTANT) -->
<meta name="theme-color" content="#0c4a6e">

<title>Happy Birthday 💖</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0c4a6e; /* fallback */
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0284c7, #1e40af, #0c4a6e);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* SCREEN */
.screen {
    position: fixed;
    width: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 15px;
}

.hidden { display: none; }

/* CARD */
.card {
    width: 100%;
    max-width: 500px;
    background: rgba(0,0,0,0.45);
    padding: 18px;
    border-radius: 18px;
    backdrop-filter: blur(12px);
    max-height: 65dvh;
    overflow-y: auto;
    line-height: 1.6;
}

/* BUTTON */
button {
    margin-top: 12px;
    padding: 14px;
    width: 100%;
    max-width: 300px;
    border-radius: 14px;
    border: none;
    background: #ff4da6;
    color: white;
    font-size: 16px;
}

/* GIFT */
.gift {
    font-size: 70px;
    animation: bounce 1.5s infinite;
    cursor: pointer;
}
@keyframes bounce {
    50% { transform: translateY(-12px); }
}

/* IMAGE */
img {
    width: 100px;
    margin-bottom: 10px;
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall linear infinite;
}
@keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); }
}

/* NEW ANIMATIONS */
.sparkle {
    position: fixed;
    animation: sparkleMove 4s linear infinite;
}
@keyframes sparkleMove {
    to { transform: translateY(-100vh); opacity: 0; }
}

.bubble {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    animation: bubbleUp 6s linear infinite;
}
@keyframes bubbleUp {
    to { transform: translateY(-110vh); opacity: 0; }
}

.balloon {
    position: fixed;
    animation: balloonUp 7s linear infinite;
}
@keyframes balloonUp {
    to { transform: translateY(-120vh); opacity: 0; }
}

/* TYPING */
.cursor {
    display: inline-block;
    width: 5px;
    background: white;
    margin-left: 3px;
    animation: blink 1s infinite;
}
@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

    <div class="gift" onclick="openGift()">🎁</div>

function confettiBurst() {
    for (let i = 0; i < 120; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.animationDuration = (Math.random()*3+2)+"s";
        c.style.backgroundColor = ["#ff4da6","#ffd700","#00ffff","#ff6b6b"][Math.floor(Math.random()*4)];

// TYPING FIX
function typeText(text){
    let el=document.getElementById("text");
    el.innerHTML="";
    let idx=0;

    function type(){
        if(idx<text.length){
            if(text.substring(idx,idx+4)==="<br>"){
                el.innerHTML+="<br>";
                idx+=4;
            } else {
                el.innerHTML+=text.charAt(idx);
                idx++;
            }
            setTimeout(type,12);
        } else {
            el.innerHTML+='<span class="cursor"></span>';
        }
    }
    type();
}

// NEXT
